<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BI's Portfolio</title>
    <link rel="stylesheet" href="static/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
</head>
<body>
    <!-- Particles Background -->
    <div id="particles-js"></div>

    <!-- Scroll Progress Bar -->
    <div class="scroll-progress" id="scrollProgress"></div>

    <!-- Floating Navigation -->
    <nav class="floating-nav">
        <div class="nav-container">
            <a href="index.html" class="logo">BI</a>
            <div class="nav-links">
                <a href="index.html" class="active">Home</a>
                <a href="about.html">About</a>
                <a href="projects.html">Projects</a>
                <a href="contact.html">Contact</a>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <section id="home" class="hero">
            <div data-aos="fade-up" data-aos-delay="100">
                <h1>BI</h1>
            </div>
            <div data-aos="fade-up" data-aos-delay="300">
                <p class="subtitle">Developer · Creator · Problem Solver</p>
            </div>
            <div data-aos="fade-up" data-aos-delay="500">
                <p class="tagline">Building things that matter, one line of code at a time.</p>
            </div>
            <div data-aos="fade-up" data-aos-delay="700" class="hero-buttons">
                <a href="projects.html" class="cta-button">View My Work ✨</a>
                <a href="https://github.com/Ailveee" target="_blank" class="cta-button secondary">🐙 GitHub</a>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <p>&copy; 2026 BI. Built with ❤️ and Flask.</p>
            <div class="footer-links">
                <a href="https://github.com/Ailveee" target="_blank">GitHub</a>
                <a href="#" target="_blank">LinkedIn</a>
                <a href="#" target="_blank">Twitter</a>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: false, offset: 100, easing: 'ease-in-out' });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script>
        particlesJS('particles-js', {
            particles: {
                number: { value: 60, density: { enable: true, value_area: 800 } },
                color: { value: '#6c63ff' },
                shape: { type: 'circle' },
                opacity: { value: 0.4, random: true },
                size: { value: 2.5, random: true },
                line_linked: { enable: true, distance: 150, color: '#6c63ff', opacity: 0.15, width: 1 },
                move: { enable: true, speed: 1.5, direction: 'none', random: true, straight: false }
            },
            interactivity: {
                detect_on: 'canvas',
                events: { onhover: { enable: true, mode: 'repulse' } }
            }
        });
    </script>
    <script src="static/script.js"></script>
</body>
</html>
